<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📋 Data Penjualan & Stok - Galeri Ar-Rijal Dar'el</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --gold: #C5A35A;
            --dark: #2A1A1A;
            --cream: #F5E6D3;
            --white: #FFF;
            --black: #1E1E1E;
            --gray: #8B7D6B;
            --border: #3B2F2F;
            --danger: #e74c3c;
            --success: #2e7d32;
            --warning: #f39c12;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Segoe UI', 'Montserrat', 'Raleway', sans-serif;
            background: linear-gradient(160deg, #1a0f0f 0%, #2a1a1a 40%, #1e1410 100%);
            color: var(--cream);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .main-container {
            max-width: 1000px;
            width: 100%;
            background: rgba(42, 26, 26, 0.85);
            backdrop-filter: blur(15px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 30px 25px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.6), 0 0 0 1px var(--gold) inset;
            position: relative;
            overflow: hidden;
        }
        .main-container::before, .main-container::after {
            content: '';
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
        }
        .main-container::before { top:-40px; right:-40px; width:150px; height:150px; border:2px solid rgba(197,163,90,0.25); }
        .main-container::after { bottom:-30px; left:-30px; width:120px; height:120px; border:1px solid rgba(197,163,90,0.2); }
        .header { text-align: center; margin-bottom: 25px; position: relative; z-index:1; }
        .header .logo-text { font-size:2.2em; font-weight:700; color:var(--gold); letter-spacing:2px; font-family:'Playfair Display','Yeseva One',serif; text-transform:uppercase; text-shadow:0 2px 8px rgba(197,163,90,0.4); }
        .header .sub-logo { font-size:1em; color:var(--cream); letter-spacing:1px; margin-top:2px; font-style:italic; }
        .header .divider { width:120px; height:3px; background:linear-gradient(90deg, transparent, var(--gold), transparent); margin:12px auto; border-radius:3px; }
        .btn-manage {
            display: block; margin: 0 auto 20px auto; padding: 8px 20px;
            background: transparent; border: 1px solid var(--gold); color: var(--gold);
            border-radius: 20px; font-weight: 600; cursor: pointer; font-family: inherit;
            transition: 0.3s; font-size: 0.9em;
        }
        .btn-manage:hover { background: rgba(197,163,90,0.15); }
        .date-section { display:flex; align-items:center; justify-content:center; gap:12px; margin-bottom:20px; flex-wrap:wrap; z-index:1; }
        .date-section label { font-weight:600; color:var(--gold); font-size:1.05em; }
        .date-section input[type="date"] { padding:10px 16px; border-radius:10px; border:1px solid var(--gold); background:var(--dark); color:var(--cream); font-size:1em; font-family:inherit; outline:none; transition:0.3s; }
        .filter-tabs { display:flex; gap:8px; justify-content:center; flex-wrap:wrap; margin-bottom:25px; z-index:1; }
        .filter-tab {
            padding: 8px 18px; border-radius: 20px; background: transparent; border: 1px solid var(--border);
            color: var(--cream); cursor: pointer; font-weight: 600; font-family: inherit; transition: 0.3s; font-size:0.9em;
        }
        .filter-tab.active { background: var(--gold); color: var(--dark); border-color: var(--gold); }
        .filter-tab:hover { border-color: var(--gold); background: rgba(197,163,90,0.15); }
        .pencarian-container {
            background: rgba(30,20,20,0.7); border:1px solid var(--border); border-radius:16px; padding:20px;
            margin-bottom:25px; display:flex; flex-wrap:wrap; align-items:flex-end; gap:12px; z-index:1;
        }
        .pencarian-container .field { display:flex; flex-direction:column; gap:5px; }
        .pencarian-container label { font-size:0.9em; font-weight:600; color:var(--gold); }
        .pencarian-container input[type="text"], .pencarian-container input[type="number"] {
            padding:10px 14px; border-radius:10px; border:1px solid var(--border); background:var(--dark);
            color:var(--cream); font-family:inherit; font-size:1em; outline:none; transition:0.3s;
        }
        .pencarian-container input[type="text"] { width:260px; }
        .pencarian-container input[type="number"] { width:100px; }
        .btn-tambah {
            padding:10px 20px; border-radius:30px; font-weight:700; font-size:1em; background:var(--gold);
            color:var(--dark); border:none; cursor:pointer; letter-spacing:0.5px; font-family:inherit; transition:0.3s; align-self:flex-end;
        }
        .btn-tambah:hover { background:#d4b368; box-shadow:0 6px 20px rgba(197,163,90,0.5); transform:translateY(-2px); }
        .keranjang-container { position:relative; z-index:1; }
        .table-wrapper { overflow-x:auto; border-radius:16px; border:1px solid var(--border); background:rgba(30,20,20,0.7); margin-bottom:20px; }
        table { width:100%; border-collapse:collapse; font-size:0.95em; min-width:600px; }
        thead th { background:#3b2f2f; color:var(--gold); padding:14px 10px; text-align:center; font-weight:700; letter-spacing:0.5px; border-bottom:2px solid var(--gold); }
        tbody td { padding:10px 8px; text-align:center; border-bottom:1px solid rgba(139,125,107,0.25); color:var(--cream); }
        tbody tr:hover { background:rgba(197,163,90,0.08); }
        .item-name { text-align:left; padding-left:16px; }
        .harga-input, .qty-input-keranjang {
            width:90px; padding:8px; text-align:center; background:#2a1a1a; border:1px solid var(--border);
            color:var(--cream); border-radius:8px; font-weight:600; font-family:inherit; font-size:0.95em; transition:0.3s;
        }
        .subtotal-cell { font-weight:700; color:#fff; white-space:nowrap; }
        .btn-hapus { background:none; border:none; color:var(--danger); cursor:pointer; font-size:1.2em; transition:0.3s; }
        .btn-hapus:hover { color:#ff6b6b; transform:scale(1.2); }
        .total-section {
            display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap;
            padding:15px 20px; background:rgba(197,163,90,0.08); border-radius:12px; border:1px solid var(--border);
            margin-bottom:15px; z-index:1;
        }
        .total-section .label-total { font-size:1.3em; font-weight:700; color:var(--gold); }
        .total-section .value-total {
            font-size:1.8em; font-weight:800; color:#fff; background:var(--dark); padding:6px 20px;
            border-radius:10px; border:1px solid var(--gold);
        }
        .rekap-section {
            background:rgba(30,20,20,0.8); border:1px solid var(--border); border-radius:16px; padding:20px;
            margin-bottom:25px; z-index:1;
        }
        .rekap-section h3 { color:var(--gold); margin-bottom:15px; font-size:1.2em; letter-spacing:1px; text-align:center; text-transform:uppercase; }
        .rekap-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(280px,1fr)); gap:10px; }
        .rekap-item {
            display:flex; justify-content:space-between; align-items:center; background:rgba(42,26,26,0.7);
            padding:10px 14px; border-radius:10px; border:1px solid rgba(197,163,90,0.2); transition:0.3s; flex-wrap:wrap;
        }
        .rekap-item:hover { border-color:var(--gold); background:rgba(197,163,90,0.12); }
        .rekap-nama { font-weight:600; color:var(--cream); font-size:0.9em; }
        .rekap-info { text-align:right; font-size:0.85em; display:flex; flex-direction:column; }
        .stok-awal { color:#aaa; font-size:0.8em; }
        .rekap-qty { color:var(--gold); font-weight:700; }
        .stok-sisa { color:var(--success); font-weight:700; }
        .stok-habis { color:var(--danger); font-weight:700; }
        .rekap-total { color:#fff; font-weight:700; }
        .warning-text { color: var(--warning); font-size: 0.85em; margin-top: 5px; text-align: center; }
        .btn-group { display:flex; gap:12px; flex-wrap:wrap; justify-content:center; z-index:1; }
        .btn {
            padding:12px 22px; border-radius:30px; font-weight:700; font-size:0.95em; cursor:pointer;
            letter-spacing:0.5px; border:none; transition:all 0.3s ease; font-family:inherit;
            display:flex; align-items:center; gap:7px;
        }
        .btn-teks { background:var(--cream); color:var(--dark); }
        .btn-teks:hover { background:#fff; box-shadow:0 6px 20px rgba(245,230,211,0.4); transform:translateY(-2px); }
        .btn-gambar { background:var(--gold); color:var(--dark); }
        .btn-gambar:hover { background:#d4b368; box-shadow:0 6px 20px rgba(197,163,90,0.5); transform:translateY(-2px); }
        .btn-pdf { background:var(--dark); color:var(--gold); border:2px solid var(--gold); }
        .btn-pdf:hover { background:#3b2f2f; box-shadow:0 6px 20px rgba(197,163,90,0.3); transform:translateY(-2px); }
        .btn-reset { background:transparent; color:#aaa; border:1px solid #555; }
        .btn-reset:hover { color:#fff; border-color:#fff; }
        .notif-simpan {
            position:fixed; bottom:20px; right:20px; background:var(--success); color:white; padding:10px 20px;
            border-radius:30px; font-weight:600; z-index:999; opacity:0; transform:translateY(20px);
            transition:0.3s ease; pointer-events:none;
        }
        .notif-simpan.muncul { opacity:1; transform:translateY(0); }
        .text-center { text-align:center; color:var(--gray); padding:15px; }
        /* Modal */
        .modal-overlay {
            display:none; position:fixed; top:0; left:0; width:100%; height:100%;
            background:rgba(0,0,0,0.7); z-index:1000; justify-content:center; align-items:center;
        }
        .modal-overlay.active { display:flex; }
        .modal-box {
            background:#1e1410; border:1px solid var(--gold); border-radius:20px;
            padding:25px; max-width:500px; width:90%; max-height:80vh; overflow-y:auto;
            color:var(--cream);
        }
        .modal-box h3 { color:var(--gold); margin-bottom:15px; text-align:center; }
        .modal-box input {
            width:100%; padding:10px; margin-bottom:10px; background:var(--dark);
            border:1px solid var(--border); color:var(--cream); border-radius:8px; font-family:inherit;
        }
        .btn-simpan { background:var(--gold); color:var(--dark); margin-right:10px; padding:10px 20px; border-radius:30px; font-weight:700; cursor:pointer; border:none; font-family:inherit; }
        .btn-batal { background:transparent; color:var(--cream); border:1px solid #555; padding:10px 20px; border-radius:30px; font-weight:700; cursor:pointer; font-family:inherit; }
        .barang-list { margin-top:15px; border-top:1px solid var(--border); padding-top:10px; }
        .barang-item { display:flex; justify-content:space-between; align-items:center; padding:8px 0; border-bottom:1px solid rgba(255,255,255,0.1); }
        .barang-item button { background:none; border:none; color:var(--danger); cursor:pointer; font-size:1.2em; }
        @media print {
            body { background:white !important; padding:0 !important; }
            .main-container { box-shadow:none !important; border:none !important; background:white !important; color:black !important; border-radius:0; padding:20px; }
            .header .logo-text { color:#000 !important; text-shadow:none !important; }
            .header .sub-logo { color:#333 !important; }
            .header .divider { background:#000 !important; }
            thead th { background:#eee !important; color:#000 !important; border-bottom:2px solid #000 !important; }
            tbody td { color:#000 !important; border-bottom:1px solid #ccc !important; }
            .harga-input, .qty-input-keranjang { border:1px solid #ccc !important; background:#fff !important; color:#000 !important; }
            .subtotal-cell { color:#000 !important; }
            .total-section, .rekap-section { background:#fafafa !important; border:1px solid #ccc !important; }
            .total-section .label-total { color:#000 !important; }
            .total-section .value-total { background:#fff !important; color:#000 !important; border:1px solid #000 !important; }
            .rekap-section h3 { color:#000 !important; }
            .rekap-item { background:#fff !important; border:1px solid #ccc !important; }
            .rekap-nama { color:#000 !important; }
            .rekap-qty { color:#000 !important; }
            .stok-sisa { color:var(--success) !important; }
            .rekap-total { color:#000 !important; }
            .no-print { display:none !important; }
        }
    </style>
</head>
<body>
    <div class="main-container" id="exportArea">
        <div class="header">
            <div class="logo-text">Galeri Ar-Rijal Dar'el</div>
            <div class="sub-logo">Darul Ilmi — Gagah Beradab</div>
            <div class="divider"></div>
        </div>

        <button class="btn-manage no-print" onclick="bukaManajemen()">🛠️ Manajemen Barang</button>

        <div class="date-section">
            <label for="tanggalInput">📅 Tanggal Penjualan:</label>
            <input type="date" id="tanggalInput" required>
        </div>

        <div class="filter-tabs no-print">
            <button class="filter-tab active" data-filter="tanggal">📆 Hari Ini</button>
            <button class="filter-tab" data-filter="semua">🗂️ Semua Data</button>
        </div>

        <div class="pencarian-container no-print">
            <div class="field">
                <label for="searchBarang">🔍 Cari Nama Barang</label>
                <input type="text" id="searchBarang" list="barangList" placeholder="Ketik nama barang..." autocomplete="off">
                <datalist id="barangList"></datalist>
            </div>
            <div class="field">
                <label for="jumlahBarang">🔢 Jumlah</label>
                <input type="number" id="jumlahBarang" min="1" value="1" placeholder="1">
            </div>
            <button class="btn-tambah" onclick="tambahBarang()">➕ Tambah</button>
        </div>

        <div class="keranjang-container">
            <div class="table-wrapper">
                <table>
                    <thead><tr><th>No</th><th>Nama Barang</th><th>Harga (Rp)</th><th>Jumlah</th><th>Subtotal</th><th>Aksi</th></tr></thead>
                    <tbody id="tbodyKeranjang"><tr><td colspan="6" class="text-center">Memuat data...</td></tr></tbody>
                </table>
            </div>
            <div class="total-section">
                <span class="label-total">💰 TOTAL PENDAPATAN</span>
                <span class="value-total" id="totalPendapatan">Rp 0</span>
            </div>
            <div class="rekap-section">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <h3 style="margin-bottom:0;">📊 Rekap Penjualan & Stok</h3>
                    <button class="btn-manage no-print" onclick="toggleTampilSemuaStok()" style="margin:0;">📦 Semua Stok</button>
                </div>
                <div id="stokErrorMsg" class="warning-text" style="display:none;">⚠️ Gagal memuat data barang, stok tidak akurat.</div>
                <div class="rekap-grid" id="rekapGrid" style="margin-top:15px;"><div class="text-center">Belum ada data</div></div>
            </div>
        </div>

        <div class="btn-group no-print">
            <button class="btn btn-teks" onclick="eksporTeks()">📝 Ekspor Teks</button>
            <button class="btn btn-gambar" onclick="eksporGambar()">🖼️ Ekspor Gambar</button>
            <button class="btn btn-pdf" onclick="eksporPDF()">🖨️ Ekspor PDF</button>
            <button class="btn btn-reset" onclick="resetKeranjang()">🔄 Reset</button>
        </div>
    </div>

    <!-- Modal Manajemen Barang -->
    <div class="modal-overlay no-print" id="modalManajemen">
        <div class="modal-box">
            <h3>📦 Manajemen Barang</h3>
            <label>Nama Barang</label>
            <input type="text" id="inputNamaBaru" placeholder="Masukkan nama barang">
            <label>Stok Awal</label>
            <input type="number" id="inputStokBaru" min="0" value="0">
            <label>Harga Default (Rp)</label>
            <input type="number" id="inputHargaBaru" min="0" value="0">
            <div style="margin-top:15px;">
                <button class="btn-simpan" onclick="simpanBarangBaru()">➕ Tambah Barang</button>
                <button class="btn-batal" onclick="tutupManajemen()">✖ Tutup</button>
            </div>
            <div class="barang-list" id="listBarangManage">Memuat daftar barang...</div>
        </div>
    </div>

    <div class="notif-simpan" id="notifSimpan">✅ Data tersimpan</div>

    <script>
        // ================= KONFIGURASI =================
        const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyekGXe1_Sj_p-2FN6MhOSpdUqiEsHybWoKGKr0n9tTGrJ-sjVzEVeL12GkHEjfpU67/exec';

        let semuaData = [];          // data penjualan (ID sebagai string)
        let daftarBarang = [];       // daftar barang dari sheet Barang
        let stokAwalMap = {};        // mapping nama -> stok awal
        let filterAktif = 'tanggal';
        let keranjang = [];          // data yang sedang difilter
        let tampilSemuaStok = false;
        let barangGagalDimuat = false;

        const tglInput = document.getElementById('tanggalInput');
        tglInput.value = new Date().toISOString().split('T')[0];

        // ================= INISIALISASI =================
        async function init() {
            await fetchBarang();
            await fetchData();
        }
        init();

        // ================= MANAJEMEN BARANG =================
        async function fetchBarang() {
            try {
                const resp = await fetch(APPS_SCRIPT_URL + '?api=barang');
                if (!resp.ok) throw new Error('HTTP ' + resp.status);
                const data = await resp.json();
                daftarBarang = data.map(item => ({ nama: item.nama, harga: item.hargaDefault || 0 }));
                stokAwalMap = {};
                data.forEach(item => { stokAwalMap[item.nama] = item.stokAwal; });
                barangGagalDimuat = false;
                document.getElementById('stokErrorMsg').style.display = 'none';
                renderDatalist();
            } catch (e) {
                console.error('Gagal fetch barang:', e);
                barangGagalDimuat = true;
                document.getElementById('stokErrorMsg').style.display = 'block';
                renderDatalist();
            }
        }

        function renderDatalist() {
            const dl = document.getElementById('barangList');
            dl.innerHTML = '';
            daftarBarang.forEach(b => {
                const opt = document.createElement('option');
                opt.value = b.nama;
                dl.appendChild(opt);
            });
        }

        function bukaManajemen() {
            if (barangGagalDimuat) alert('⚠️ Daftar barang belum berhasil dimuat. Refresh halaman jika perlu.');
            document.getElementById('modalManajemen').classList.add('active');
            renderDaftarDiModal();
        }
        function tutupManajemen() { document.getElementById('modalManajemen').classList.remove('active'); }

        function renderDaftarDiModal() {
            const cont = document.getElementById('listBarangManage');
            if (daftarBarang.length === 0) {
                cont.innerHTML = '<div style="padding:10px;">Tidak ada barang</div>';
                return;
            }
            let h = '';
            daftarBarang.forEach(b => {
                const stok = stokAwalMap[b.nama] || 0;
                const namaAman = b.nama.replace(/'/g, "\\'");
                h += `<div class="barang-item"><span>${b.nama} (Stok: ${stok})</span><button onclick="hapusBarang('${namaAman}')">🗑️</button></div>`;
            });
            cont.innerHTML = h;
        }

        async function simpanBarangBaru() {
            const nama = document.getElementById('inputNamaBaru').value.trim();
            const stok = parseInt(document.getElementById('inputStokBaru').value) || 0;
            const harga = parseInt(document.getElementById('inputHargaBaru').value) || 0;
            if (!nama) return alert('Nama wajib diisi');
            const fd = new FormData();
            fd.append('action', 'tambahBarang');
            fd.append('nama', nama);
            fd.append('stok', stok);
            fd.append('harga', harga);
            try {
                const r = await fetch(APPS_SCRIPT_URL, { method: 'POST', body: fd });
                const t = await r.text();
                if (t === 'OK') {
                    notifSimpan('✅ Barang ditambahkan');
                    document.getElementById('inputNamaBaru').value = '';
                    document.getElementById('inputStokBaru').value = 0;
                    document.getElementById('inputHargaBaru').value = 0;
                    await fetchBarang();
                    renderDataDifilter();
                    renderDaftarDiModal();
                } else alert('Gagal: ' + t);
            } catch (e) { alert('Gagal koneksi'); }
        }

        async function hapusBarang(nama) {
            if (!confirm(`Hapus barang "${nama}"?`)) return;
            const fd = new FormData();
            fd.append('action', 'hapusBarang');
            fd.append('nama', nama);
            try {
                await fetch(APPS_SCRIPT_URL, { method: 'POST', body: fd });
                notifSimpan('✅ Barang dihapus');
                await fetchBarang();
                renderDataDifilter();
                renderDaftarDiModal();
            } catch (e) { alert('Gagal hapus'); }
        }

        // ================= PENJUALAN =================
        async function fetchData() {
            try {
                const resp = await fetch(APPS_SCRIPT_URL);
                const data = await resp.json();
                semuaData = data.map(d => ({
                    id: String(d.id),          // 🔥 WAJIB STRING
                    nama: d.nama,
                    harga: Number(d.harga),
                    jumlah: Number(d.jumlah),
                    tanggal: d.tanggal || ''
                }));
                renderDataDifilter();
            } catch (e) {
                document.getElementById('tbodyKeranjang').innerHTML =
                    '<tr><td colspan="6" style="color:#e74c3c; text-align:center;">❌ Gagal memuat data penjualan</td></tr>';
            }
        }

        async function simpanKeSheet(action, params) {
            const fd = new FormData();
            fd.append('action', action);
            for (let k in params) fd.append(k, params[k]);
            try {
                const resp = await fetch(APPS_SCRIPT_URL, { method: 'POST', body: fd });
                const hasil = await resp.text();
                if (hasil.trim() === 'OK') {
                    notifSimpan('✅ Data tersimpan');
                } else {
                    alert('⚠️ Server menjawab: ' + hasil + '\nData mungkin tidak tersimpan.');
                }
            } catch (e) {
                alert('❌ Gagal menyimpan. Periksa koneksi internet.\n' + e.message);
            }
        }

        function notifSimpan(teks) {
            const n = document.getElementById('notifSimpan');
            n.textContent = teks;
            n.classList.add('muncul');
            clearTimeout(n._t);
            n._t = setTimeout(() => n.classList.remove('muncul'), 1500);
        }

        function getStokTersisa(nama) {
            if (barangGagalDimuat) return 99999;
            const awal = stokAwalMap[nama] || 0;
            const terjual = semuaData.filter(i => i.nama === nama).reduce((s, i) => s + i.jumlah, 0);
            return Math.max(0, awal - terjual);
        }

        function tambahBarang() {
            const nama = document.getElementById('searchBarang').value.trim();
            const jml = parseInt(document.getElementById('jumlahBarang').value) || 1;
            if (!nama) return alert('⚠️ Pilih barang');
            if (jml < 1) return alert('⚠️ Jumlah minimal 1');
            const sisa = getStokTersisa(nama);
            if (jml > sisa) return alert(`⚠️ Stok tidak cukup! Sisa: ${sisa}`);

            const found = daftarBarang.find(b => b.nama.toLowerCase() === nama.toLowerCase());
            const harga = found ? found.harga : 0;
            // 🔥 ID UNIK GLOBAL (timestamp + random)
            const idBaru = Date.now().toString(36) + '-' + Math.random().toString(36).substring(2, 8);
            const item = { id: idBaru, nama, harga, jumlah: jml, tanggal: tglInput.value };
            semuaData.push(item);
            simpanKeSheet('tambah', { id: idBaru, nama, harga, jumlah: jml, tanggal: tglInput.value });
            document.getElementById('searchBarang').value = '';
            document.getElementById('jumlahBarang').value = 1;
            renderDataDifilter();
        }

        function hapusItem(id) {
            semuaData = semuaData.filter(item => String(item.id) !== String(id));
            simpanKeSheet('hapus', { id });
            renderDataDifilter();
        }

        function updateHarga(inp) {
            const id = String(inp.dataset.id);
            const item = semuaData.find(it => String(it.id) === id);
            if (item) {
                item.harga = parseInt(inp.value) || 0;
                simpanKeSheet('update', { id, harga: item.harga, jumlah: item.jumlah });
            }
            renderDataDifilter();
        }

        function updateJumlah(inp) {
            const id = String(inp.dataset.id);
            const item = semuaData.find(it => String(it.id) === id);
            if (item) {
                const baru = parseInt(inp.value) || 1;
                const stokTersedia = getStokTersisa(item.nama) + item.jumlah;
                if (baru > stokTersedia) {
                    alert(`⚠️ Melebihi stok!`);
                    inp.value = item.jumlah;
                    return;
                }
                item.jumlah = baru;
                simpanKeSheet('update', { id, harga: item.harga, jumlah: baru });
            }
            renderDataDifilter();
        }

        function renderKeranjang() {
            const tbody = document.getElementById('tbodyKeranjang');
            if (keranjang.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" class="text-center">Tidak ada data</td></tr>';
                document.getElementById('totalPendapatan').textContent = 'Rp 0';
                return;
            }
            let h = '';
            keranjang.forEach((item, i) => {
                h += `<tr data-id="${item.id}">
                    <td>${i+1}</td><td class="item-name">${item.nama}</td>
                    <td><input type="number" class="harga-input" value="${item.harga}" min="0" data-id="${item.id}" onchange="updateHarga(this)"></td>
                    <td><input type="number" class="qty-input-keranjang" value="${item.jumlah}" min="1" data-id="${item.id}" onchange="updateJumlah(this)"></td>
                    <td class="subtotal-cell">Rp ${(item.harga*item.jumlah).toLocaleString('id-ID')}</td>
                    <td><button class="btn-hapus" onclick="hapusItem('${item.id}')">🗑️</button></td>
                </tr>`;
            });
            tbody.innerHTML = h;
            const total = keranjang.reduce((s, it) => s + (it.harga * it.jumlah), 0);
            document.getElementById('totalPendapatan').textContent = 'Rp ' + total.toLocaleString('id-ID');
        }

        function renderStok() {
            const grid = document.getElementById('rekapGrid');
            if (barangGagalDimuat && Object.keys(stokAwalMap).length === 0) {
                grid.innerHTML = '<div class="text-center">⚠️ Data barang tidak tersedia</div>';
                return;
            }
            const rekapMap = {};
            const dataTampil = getDataDifilter();

            dataTampil.forEach(item => {
                if (!rekapMap[item.nama]) rekapMap[item.nama] = { terjual: 0, total: 0 };
                rekapMap[item.nama].terjual += item.jumlah;
                rekapMap[item.nama].total += item.harga * item.jumlah;
            });

            const semuaNama = Object.keys(stokAwalMap);
            let daftarTampil = [];
            if (filterAktif === 'semua' || tampilSemuaStok) {
                daftarTampil = semuaNama;
            } else {
                daftarTampil = Object.keys(rekapMap);
            }

            if (!daftarTampil.length) {
                grid.innerHTML = '<div class="text-center">Belum ada data</div>';
                return;
            }

            daftarTampil.sort((a, b) => (rekapMap[b]?.terjual || 0) - (rekapMap[a]?.terjual || 0));

            let h = '';
            daftarTampil.forEach(nama => {
                const awal = stokAwalMap[nama] || 0;
                const totalTerjualAll = semuaData.filter(i => i.nama === nama).reduce((s, i) => s + i.jumlah, 0);
                const sisa = Math.max(0, awal - totalTerjualAll);
                const tHari = rekapMap[nama]?.terjual || 0;
                const totHari = rekapMap[nama]?.total || 0;
                const klas = sisa === 0 ? 'stok-habis' : 'stok-sisa';
                h += `<div class="rekap-item">
                    <span class="rekap-nama">${nama}</span>
                    <div class="rekap-info">
                        <div><span class="stok-awal">Awal: ${awal}</span> | <span class="rekap-qty">Terjual: ${tHari} pcs</span> | <span class="${klas}">Sisa: ${sisa}</span></div>
                        ${tHari > 0 ? `<div class="rekap-total">Rp ${totHari.toLocaleString('id-ID')}</div>` : ''}
                    </div>
                </div>`;
            });
            grid.innerHTML = h;
        }

        function toggleTampilSemuaStok() {
            tampilSemuaStok = !tampilSemuaStok;
            const btn = document.querySelector('.btn-manage[onclick="toggleTampilSemuaStok()"]');
            if (btn) btn.textContent = tampilSemuaStok ? '📦 Sembunyikan' : '📦 Semua Stok';
            renderStok();
        }

        // ================= FILTER & RENDER =================
        document.querySelectorAll('.filter-tab').forEach(tab => {
            tab.addEventListener('click', function() {
                document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
                this.classList.add('active');
                filterAktif = this.dataset.filter;
                renderDataDifilter();
            });
        });
        tglInput.addEventListener('change', () => {
            if (filterAktif === 'tanggal') renderDataDifilter();
        });

        // 🔥 FUNGSI FILTER TANGGAL YANG DIPERBAIKI
        function getDataDifilter() {
            if (filterAktif === 'tanggal') {
                const tgl = tglInput.value.trim();
                return semuaData.filter(item => {
                    if (!item.tanggal) return false;
                    // Ambil 10 karakter pertama (YYYY-MM-DD), buang spasi
                    const tanggalItem = String(item.tanggal).trim().substring(0, 10);
                    return tanggalItem === tgl;
                });
            }
            return semuaData;
        }

        function renderDataDifilter() {
            keranjang = getDataDifilter().map(i => ({
                id: String(i.id),
                nama: i.nama,
                harga: Number(i.harga),
                jumlah: Number(i.jumlah)
            }));
            renderKeranjang();
            renderStok();
        }

        async function resetKeranjang() {
            const dataTerfilter = getDataDifilter();
            if (!dataTerfilter.length) return;
            if (!confirm(`⚠️ Hapus ${dataTerfilter.length} transaksi yang terlihat saat ini? Data di tanggal lain tetap aman.`)) return;

            const ids = dataTerfilter.map(i => String(i.id));
            semuaData = semuaData.filter(i => !ids.includes(String(i.id)));
            let gagal = 0;
            for (const id of ids) {
                try {
                    const fd = new FormData();
                    fd.append('action', 'hapus');
                    fd.append('id', id);
                    const resp = await fetch(APPS_SCRIPT_URL, { method: 'POST', body: fd });
                    if ((await resp.text()).trim() !== 'OK') gagal++;
                } catch (e) { gagal++; }
            }
            if (gagal > 0) alert(`⚠️ ${gagal} data gagal dihapus dari server.`);
            else notifSimpan('✅ Data berhasil dihapus');
            renderDataDifilter();
        }

        function getTanggalISO() { return tglInput.value; }

        function eksporTeks() {
            const data = getDataDifilter();
            if (!data.length) return alert('Tidak ada data');
            let t = 'GALERI AR-RIJAL DAR\'EL - LAPORAN\nTanggal: ' + (filterAktif === 'tanggal' ? tglInput.value : 'Semua') + '\n\n';
            data.forEach((it, i) => t += `${i + 1}. ${it.nama} | Rp ${it.harga} | ${it.jumlah} | Rp ${it.harga * it.jumlah}\n`);
            t += '\nTOTAL: Rp ' + data.reduce((s, i) => s + i.harga * i.jumlah, 0);
            downloadFile(t, 'penjualan-' + getTanggalISO() + '.txt', 'text/plain');
        }

        function eksporGambar() {
            if (!getDataDifilter().length) return alert('Tidak ada data');
            html2canvas(document.getElementById('exportArea'), { backgroundColor: '#1a0f0f', scale: 2, ignoreElements: el => el.classList.contains('no-print') })
                .then(c => {
                    const a = document.createElement('a');
                    a.download = 'penjualan-' + getTanggalISO() + '.png';
                    a.href = c.toDataURL();
                    a.click();
                });
        }

        function eksporPDF() {
            if (!getDataDifilter().length) return alert('Tidak ada data');
            window.print();
        }

        function downloadFile(c, f, m) {
            const b = new Blob([c], { type: m });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(b);
            a.download = f;
            a.click();
        }
    </script>
</body>
</html>
